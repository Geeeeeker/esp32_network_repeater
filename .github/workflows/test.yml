name: Build ESP32 Network Repeater Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'  # 如果仓库有子模块，递归拉取

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          # 使用 ESP-IDF 版本 v5.4（与项目推荐版本一致）
          esp_idf_version: v5.4
          # 目标芯片为 ESP32
          target: esp32
          # 项目根目录（默认即为 .）
          path: .
          # 构建命令
          command: idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-network-repeater-firmware
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: error
          retention-days: 7
