name: Build ESP32 Network Repeater Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'ESP32 chip target'
        required: true
        default: 'esp32'
        type: choice
        options:
          - esp32
          - esp32s2
          - esp32s3
          - esp32c3
          - esp32c5
          - esp32c6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: ${{ github.event.inputs.target || 'esp32' }}
          path: .
          command: |
            # 强制重置目标芯片，覆盖已有的 sdkconfig
            idf.py set-target -f ${{ github.event.inputs.target || 'esp32' }}
            idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-network-repeater-firmware-${{ github.event.inputs.target || 'esp32' }}
          path: |
            build/*.bin
            build/bootloader/*.bin
            build/partition_table/*.bin
          if-no-files-found: error
          retention-days: 7
